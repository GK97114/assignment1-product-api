name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Step 3: Install dependencies for Catalog Service
      - name: Install Catalog Service dependencies
        run: |
          cd catalog-service
          npm install

      # Step 4: Run tests for Catalog Service
      - name: Run Catalog Service tests
        run: |
          cd catalog-service
          npm test -- --json --outputFile=test-results.json --coverage

      # Step 5: Install dependencies for Management Service
      - name: Install Management Service dependencies
        run: |
          cd management-service
          npm install

      # Step 6: Run tests for Management Service
      - name: Run Management Service tests
        run: |
          cd management-service
          npm test -- --json --outputFile=test-results.json --coverage

      # Step 7: Upload test results (Catalog Service)
      - name: Upload Catalog Service test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-service-test-results
          path: catalog-service/test-results.json

      # Step 8: Upload test results (Management Service)
      - name: Upload Management Service test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: management-service-test-results
          path: management-service/test-results.json

      # Step 9: Upload coverage reports (Catalog Service)
      - name: Upload Catalog Service coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-service-coverage
          path: catalog-service/coverage/

      # Step 10: Upload coverage reports (Management Service)
      - name: Upload Management Service coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: management-service-coverage
          path: management-service/coverage/

      # Step 11: Comment on PR with test results (optional)
      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ CI/CD Pipeline passed! Tests completed successfully for both Catalog and Management services.\n\nTest results are available in the [Artifacts](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') section.'
            })
